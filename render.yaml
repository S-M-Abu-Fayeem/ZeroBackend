databases:
  - name: zero-postgres
    plan: starter
    databaseName: zero_waste_db
    user: zero_user

services:
  - type: web
    name: zero-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: sh start.sh
    autoDeploy: true
    envVars:
      - key: AI_FREE_ONLY_MODE
        value: true
      - key: AI_HTTP_TIMEOUT
        value: 20
      - key: ALLOW_GROQ_FALLBACK
        value: false
      - key: AUTH_USER_CACHE_TTL
        value: 120
      - key: AUTO_SETUP_DATABASE_ON_START
        value: true
      - key: DB_BOOTSTRAP_RETRIES
        value: 10
      - key: DB_BOOTSTRAP_RETRY_DELAY
        value: 3
      - key: DB_CONNECT_TIMEOUT
        value: 10
      - key: DB_KEEPALIVES
        value: 1
      - key: DB_KEEPALIVES_COUNT
        value: 5
      - key: DB_KEEPALIVES_IDLE
        value: 30
      - key: DB_KEEPALIVES_INTERVAL
        value: 10
      - key: DB_MAX_CONN
        value: 40
      - key: DB_MIN_CONN
        value: 4
      - key: DB_POOL_MAX_IDLE
        value: 60
      - key: DB_POOL_MAX_LIFETIME
        value: 300
      - key: DB_POOL_TIMEOUT
        value: 30
      - key: DB_QUERY_RETRIES
        value: 2
      - key: DB_QUERY_RETRY_DELAY
        value: 0.3
      - key: DB_SSLMODE
        value: require
      - key: GUNICORN_THREADS
        value: 8
      - key: GUNICORN_TIMEOUT
        value: 120
      - key: GUNICORN_WORKERS
        value: 1
      - key: MAX_IMAGE_BYTES
        value: 8388608
      - key: USE_FREE_VISION
        value: true
